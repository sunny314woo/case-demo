<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学生成绩单</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="page">
    <header class="page-header">
        <h1>学生期末成绩单</h1>
        <div class="toolbar">
            <a class="btn btn--primary" href="/students/new">新增学生成绩</a>
        </div>
    </header>

    <div class="table-card table-scroll">
        <table class="data-table">
            <thead>
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th class="num">语文</th>
                    <th class="num">数学</th>
                    <th class="num">英语</th>
                    <th class="num">总分</th>
                    <th class="num">平均分</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.student_no }}</td>
                    <td class="name">{{ student.name }}</td>
                    <td class="num">{{ student.chinese }}</td>
                    <td class="num">{{ student.math }}</td>
                    <td class="num">{{ student.english }}</td>
                    <td class="num">{{ student.total }}</td>
                    <td class="num">{{ student.average }}</td>
                    <td class="actions">
                        <a href="/students/{{ student.id }}/edit">编辑</a>
                        <a class="link--danger" href="/students/{{ student.id }}/delete">删除</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="8">
                        <p class="empty-hint">暂无成绩记录，点击右上角「新增学生成绩」开始录入。</p>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
