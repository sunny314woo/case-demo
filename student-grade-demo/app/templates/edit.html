<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>编辑学生</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="page page--narrow">
    <header class="page-header">
        <h1>编辑学生成绩</h1>
        <div class="toolbar">
            <a class="back-link" href="/">← 返回列表</a>
        </div>
    </header>

    <form class="form-card" method="post" action="/students/{{ student.id }}/edit">
        <div class="field">
            <label for="student_no">学号</label>
            <input
                id="student_no"
                type="text"
                name="student_no"
                value="{{ student.student_no }}"
                required
                autocomplete="off"
            >
        </div>
        <div class="field">
            <label for="name">姓名</label>
            <input
                id="name"
                type="text"
                name="name"
                value="{{ student.name }}"
                required
                autocomplete="name"
            >
        </div>
        <div class="field">
            <label for="chinese">语文</label>
            <input
                id="chinese"
                type="number"
                step="0.1"
                name="chinese"
                value="{{ student.chinese }}"
                required
            >
        </div>
        <div class="field">
            <label for="math">数学</label>
            <input
                id="math"
                type="number"
                step="0.1"
                name="math"
                value="{{ student.math }}"
                required
            >
        </div>
        <div class="field">
            <label for="english">英语</label>
            <input
                id="english"
                type="number"
                step="0.1"
                name="english"
                value="{{ student.english }}"
                required
            >
        </div>
        <button class="btn btn--primary btn--block" type="submit">更新</button>
    </form>
</main>
</body>
</html>
